# actions-runner-scaleset-proxmox — example configuration.
#
# Secrets are NEVER stored in this file. Fields ending in `*_env` name an
# environment variable from which the secret is read at startup.
#
# Required env vars (when corresponding fields are used):
#   - GITHUB_PAT             (when github.auth_mode = pat)
#   - PROXMOX_TOKEN_SECRET   (Proxmox API token secret)
#   - SCALESET_ADMIN_SECRET  (admin HTTP API bearer token; optional)

github:
  # "app" or "pat".
  auth_mode: pat

  # Used when auth_mode = app. Set exactly one of client_id (newer Apps,
  # format "Iv23...") or app_id (legacy numeric ID).
  # app:
  #   client_id: "Iv23likB94..."
  #   # app_id: 123456
  #   installation_id: 789012
  #   private_key_path: /etc/scaleset/github-app.pem

  # Used when auth_mode = pat.
  pat:
    token_env: GITHUB_PAT

  # Exactly one of org or repo.
  scope:
    org: my-org
    # repo: my-org/my-repo

  # GitHub REST reconciler. Periodically lists the runners API and joins
  # the result against our DB; this catches VMs that the scaleset
  # listener silently lost (the JobStarted/JobCompleted callbacks the
  # listener occasionally drops or delivers with empty fields).
  poll_interval: 15s                # how often to query GitHub
  assigned_grace: 5m                # destroy assigned VMs whose runner never picked up work
  running_idle_grace: 30s           # destroy running VMs whose runner went idle (missed JobCompleted)
  assigned_offline_grace: 2m        # destroy assigned VMs whose runner registered then went offline

scaleset:
  name: proxmox-ubuntu-x64
  labels: [self-hosted, linux, x64, proxmox]
  runner_group: default
  max_concurrent_runners: 50

proxmox:
  endpoint: https://pve.example.com:8006/api2/json
  insecure_skip_verify: false
  auth:
    token_id: scaleset@pve!automation
    token_secret_env: PROXMOX_TOKEN_SECRET
  template_vmid: 9000
  vmid_range: { min: 10000, max: 19999 }
  storage:
    disk: local-lvm
    snippets: local
  network:
    bridge: vmbr0
    vlan_tag: 0       # 0 = untagged
  clone:
    linked: true      # linked clones complete in 1-3s but pin to template storage

nodes:
  strategy: single                # single | round_robin | least_loaded
  members: [pve1, pve2, pve3]     # ignored for "single"
  single_node: pve1               # only used when strategy = single

pool:
  hot_size: 2                     # always-booted idle runners (default; profiles can override)
  warm_size: 3                    # pre-cloned, powered-off runners (default; profiles can override)
  # Optional fleet-wide ceiling on the sum of per-profile
  # max_concurrent_runners. Validation rejects the config when the
  # arithmetic exceeds this. Leave at 0 (default) for no cap.
  # global_max: 50
  reconcile_interval: 10s
  vm_max_age: 24h                 # idle Hot/Warm VMs older than this are recycled
  drain_timeout: 30m              # max wait for running jobs on SIGTERM
  boot_max_attempts: 3            # after this many WaitReady failures the VM is "poisoned"
  # How often the orchestrator polls Proxmox for the power state of
  # Assigned/Running VMs. The in-VM gh-runner.service powers off on job
  # completion (ExecStopPost=poweroff), so observing "stopped" here is
  # the signal to mark the row completed and queue destroy. Lower =
  # snappier end-of-job tail; higher = lighter Proxmox load.
  power_poll_interval: 3s

  # Minimum time after a destroy completes before the VMID allocator
  # may reissue the same ID. Protects against PVE-side qmdestroy task
  # settle / lock-file contention: without it, a fresh clone targets
  # a VMID Proxmox is still tearing down and produces
  # "VM N is running - destroy failed" + lock-file timeouts.
  vmid_reuse_cooldown: 30s

  # Time a Proxmox VM may exist without a matching store row before
  # the GitHub reconciler's orphan sweep destroys it. Must exceed the
  # typical Clone -> guest-agent-ready -> JIT-inject worst case so the
  # sweep doesn't kill VMs the pool worker is still booting.
  orphan_grace: 60s

  # TTL safety net for the Provisioner's in-flight clone tracker.
  # Entries older than this are pruned by a background sweep in case
  # Clone hangs and never returns to clear them.
  clone_inflight_grace: 5m

# Optional runner profiles — a named bundle of {labels, template,
# hardware shape, per-profile pool sizing}. Each profile gets its
# own reconcile loop and pool state; VMs are tagged with their
# profile name so crash recovery routes them back into the right
# pool.
#
# Omit the whole block and the orchestrator synthesises a single
# "default" profile from the global pool / scaleset values above —
# pre-profile configs keep working unchanged.
#
# Per-profile sizing knobs (hot_size, warm_size,
# max_concurrent_runners, boot_max_attempts) accept an explicit 0;
# leave them off entirely to inherit the global pool / scaleset
# default.
#
# Label routing: when JobStarted fires, the scaler picks the profile
# whose labels are the smallest superset of the job's RequestLabels
# (ties resolve by declaration order). Unrouted jobs increment
# scaleset_unrouted_jobs_total{labels="..."}. Config validation
# rejects scale sets whose declared labels aren't collectively
# covered by some profile, so a missing label is a load-time error
# rather than a per-job runtime miss.
#
# profiles:
#   - name: linux-x64
#     labels: [self-hosted, linux, proxmox, x64]
#     template_vmid: 9000           # optional override of the global proxmox.template_vmid
#     cpu: 4                        # cores; 0 inherits the template default
#     memory_mb: 8192               # 0 inherits the template default
#     disk_gb: 0                    # 0 inherits the template default (resize is absolute)
#     storage: ""                   # override of proxmox.storage.disk for full clones; "" inherits
#     hot_size: 5
#     warm_size: 10
#     max_concurrent_runners: 20
#     boot_max_attempts: 3
#     vm_max_age: 12h               # per-profile recycle window
#   - name: gpu
#     labels: [self-hosted, linux, proxmox, gpu]
#     template_vmid: 9100
#     cpu: 8
#     memory_mb: 32768
#     hot_size: 0                   # explicit 0 — no idle pool, clone on demand
#     warm_size: 1
#     max_concurrent_runners: 4

observability:
  http_addr: ":9100"              # exposes /metrics /healthz /readyz
  log_level: info                 # debug | info | warn | error
  log_format: json                # json | text
  # Optional OTLP/HTTP tracing. Leave endpoint empty to disable —
  # instrumented code paths then use the no-op tracer and are free.
  tracing:
    endpoint: ""                  # e.g. "otel-collector:4318" (host:port only)
    insecure: false               # true = plain HTTP, false = HTTPS
    sample_ratio: 1.0             # [0.0, 1.0]; 1.0 = sample everything

admin_api:                        # optional escape hatch HTTP API
  # http_addr: "127.0.0.1:9101"
  # shared_secret_env: SCALESET_ADMIN_SECRET

# Multi-replica deployment via Kubernetes leader election. Leave at the
# default "standalone" for single-process / Docker / systemd. The
# binary is identical in both modes — only this block changes.
cluster:
  mode: standalone                # standalone | raft
  # raft:
  #   node_id: ""                 # defaults to $HOSTNAME, then os.Hostname
  #   bind_addr: "0.0.0.0:7000"
  #   advertise_addr: "10.0.0.1:7000"
  #   # data_dir is required when mode=raft. Raft's election-safety
  #   # invariants (currentTerm, votedFor) must survive restart so a
  #   # node cannot vote twice in the same term. Persist this on a
  #   # volume that outlives the container/process.
  #   data_dir: "/var/lib/scaleset/raft"
  #   bootstrap: true             # set true on exactly one replica at initial setup
  #   heartbeat_timeout: 1s
  #   election_timeout: 1s
  #   commit_timeout: 50ms
  #   peers:
  #     - node_id: node-a
  #       raft_addr: 10.0.0.1:7000
  #       http_addr: 10.0.0.1:9101
  #     - node_id: node-b
  #       raft_addr: 10.0.0.2:7000
  #       http_addr: 10.0.0.2:9101
  #     - node_id: node-c
  #       raft_addr: 10.0.0.3:7000
  #       http_addr: 10.0.0.3:9101
