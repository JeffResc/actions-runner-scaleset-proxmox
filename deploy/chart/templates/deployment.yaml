apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scaleset.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scaleset.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "scaleset.selectorLabels" . | nindent 6 }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "scaleset.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Force a rolling restart whenever the ConfigMap content
        # changes — otherwise an in-place ConfigMap update would only
        # take effect on the next unrelated rollout.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "scaleset.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: scaleset
          image: {{ include "scaleset.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["run", "--config=/etc/scaleset/config.yaml"]
          ports:
            - name: metrics
              containerPort: 9100
            - name: admin
              containerPort: 9101
          env:
            # Downward API — consumed by internal/config.resolveCluster
            # to default cluster.kubernetes.identity / lease_namespace
            # / pod_ip. Required when cluster.mode=kubernetes.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: GITHUB_PAT
              valueFrom:
                secretKeyRef:
                  name: {{ include "scaleset.secretName" . }}
                  key: GITHUB_PAT
            - name: PROXMOX_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "scaleset.secretName" . }}
                  key: PROXMOX_TOKEN_SECRET
            {{- if or .Values.secrets.adminApi.sharedSecretValue .Values.secrets.existingSecret }}
            - name: SCALESET_ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "scaleset.secretName" . }}
                  key: SCALESET_ADMIN_SECRET
                  optional: true
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/scaleset
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "scaleset.fullname" . }}-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
