{{- /*
helm test pod. Reachability check: hit /healthz and /readyz on the
metrics port. Both endpoints are served on every replica regardless
of leadership state, so this passes as soon as ANY pod is running and
its Proxmox client has answered a single Ping. Used by `helm test
<release>`; deleted after success.
*/ -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "scaleset.fullname" . }}-test-connection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scaleset.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      command: ["sh", "-eu", "-c"]
      args:
        - |
          host={{ include "scaleset.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
          metrics_url="http://${host}:{{ .Values.service.metricsPort }}"

          echo "GET /healthz"
          curl -fsS --max-time 5 "${metrics_url}/healthz" | grep -q "ok"

          echo "GET /readyz (allow 503 during cold start; this is best-effort)"
          # /readyz may legitimately be 503 if no pod has finished a
          # Proxmox Ping yet. We retry for up to 60s before failing.
          for i in $(seq 1 30); do
            code=$(curl -fsS -o /dev/null -w "%{http_code}" --max-time 5 "${metrics_url}/readyz" || true)
            if [ "${code}" = "200" ]; then
              echo "OK after ${i} attempts"
              exit 0
            fi
            echo "  attempt ${i}: ${code}"
            sleep 2
          done
          echo "FAIL: /readyz never returned 200"
          exit 1
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
