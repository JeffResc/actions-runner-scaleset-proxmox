{{- if not .Values.secrets.existingSecret -}}
{{- /*
Convenience Secret for dev / quick-start. For production prefer
SealedSecrets or external-secrets and set .Values.secrets.existingSecret
so the chart doesn't manage the credentials. Keys are the canonical
koanf env-override names — the orchestrator picks them up from the
matching SCALESET_<yaml.path uppercased> env var:

  SCALESET_GITHUB_PAT_TOKEN          (github.pat.token)
  SCALESET_PROXMOX_AUTH_TOKEN_SECRET (proxmox.auth.token_secret)
  SCALESET_ADMIN_API_SHARED_SECRET   (admin_api.shared_secret; optional)
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "scaleset.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scaleset.labels" . | nindent 4 }}
type: Opaque
stringData:
  SCALESET_GITHUB_PAT_TOKEN: {{ required "secrets.github.patValue is required when secrets.existingSecret is empty" .Values.secrets.github.patValue | quote }}
  SCALESET_PROXMOX_AUTH_TOKEN_SECRET: {{ required "secrets.proxmox.tokenSecretValue is required when secrets.existingSecret is empty" .Values.secrets.proxmox.tokenSecretValue | quote }}
  {{- if .Values.secrets.adminApi.sharedSecretValue }}
  SCALESET_ADMIN_API_SHARED_SECRET: {{ .Values.secrets.adminApi.sharedSecretValue | quote }}
  {{- end }}
{{- end }}
