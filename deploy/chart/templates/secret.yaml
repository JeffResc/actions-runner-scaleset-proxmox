{{- if not .Values.secrets.existingSecret -}}
{{- /*
Convenience Secret for dev / quick-start. For production prefer
SealedSecrets or external-secrets and set .Values.secrets.existingSecret
so the chart doesn't manage the credentials. Keys: GITHUB_PAT,
PROXMOX_TOKEN_SECRET, SCALESET_ADMIN_SECRET (optional).
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "scaleset.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scaleset.labels" . | nindent 4 }}
type: Opaque
stringData:
  GITHUB_PAT: {{ required "secrets.github.patValue is required when secrets.existingSecret is empty" .Values.secrets.github.patValue | quote }}
  PROXMOX_TOKEN_SECRET: {{ required "secrets.proxmox.tokenSecretValue is required when secrets.existingSecret is empty" .Values.secrets.proxmox.tokenSecretValue | quote }}
  {{- if .Values.secrets.adminApi.sharedSecretValue }}
  SCALESET_ADMIN_SECRET: {{ .Values.secrets.adminApi.sharedSecretValue | quote }}
  {{- end }}
{{- end }}
