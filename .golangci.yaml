version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unparam
    - unconvert
    - gocritic
    - revive
    - bodyclose
    - errname
    - exhaustive
    - nilerr
    - prealloc
    - gosec
  settings:
    gosec:
      excludes:
        # G304 — file paths are operator-controlled CLI/config inputs;
        # we are the trust boundary, not a target downstream of one.
        - G304
        # G115 — VMID conversions are bounded by the configured VMIDRange
        # (typically 10000..19999). uint64→int overflow is not reachable.
        - G115
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
    exhaustive:
      # State / PoolKind enums shouldn't be satisfied by a 'default' arm —
      # every value should be explicit so a new state surfaces as a lint
      # error.
      default-signifies-exhaustive: false
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unparam
          - bodyclose
          # gosec G101 flags fake PEM/token fixtures inside test files —
          # these are intentional test data, not real credentials.
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/jeffresc/github-actions-proxmox-scaleset
